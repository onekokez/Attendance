/* ── Firestore helpers ──────────────────────────── */
const FS = {
  async get(docPath, def) {
    if(!db) return def;
    try {
      const [col, id] = docPath.split("/");
      const snap = await getDoc(doc(db, col, id));
      return snap.exists() ? snap.data() : def;
    } catch(e) { console.warn("FS.get", e); return def; }
  },
  async set(docPath, data) {
    if(!db) return;
    try {
      const [col, id] = docPath.split("/");
      await setDoc(doc(db, col, id), data);
    } catch(e) { console.warn("FS.set", e); }
  },
  listen(docPath, cb) {
    if(!db) return ()=>{};
    const [col, id] = docPath.split("/");
    return onSnapshot(doc(db, col, id), snap => {
      if(snap.exists()) cb(snap.data());
    });
  }
};

/* ── Device fingerprint ─────────────────────────── */
function getDeviceId() {
  let id = localStorage.getItem("_devid");
  if(id) return id;
  const raw=[navigator.userAgent,navigator.language,screen.colorDepth,screen.width+"x"+screen.height,new Date().getTimezoneOffset(),navigator.hardwareConcurrency||"",navigator.platform||""].join("|");
  let h=0; for(let i=0;i<raw.length;i++){h=((h<<5)-h+raw.charCodeAt(i))|0;}
  id="D"+Math.abs(h).toString(16).toUpperCase();
  localStorage.setItem("_devid",id);
  return id;
}

/* ── Root App ───────────────────────────────────── */
function App(){
  const[employees,setEmployees]=useState(DEF_EMPS);
  const[adminCred,setAdminCred]=useState(DEF_ADMIN);
  const[records,  setRecords  ]=useState({});
  const[geofence, setGeofence ]=useState(DEF_GEO);
  const[session,  setSession  ]=useState(null);
  const[loading,  setLoading  ]=useState(false);
  const[locMsg,   setLocMsg   ]=useState("");
  const[toastD,   setToastD   ]=useState(null);
  const[ready,    setReady    ]=useState(false);

  const showToast=(msg,err)=>{setToastD({msg,err});setTimeout(()=>setToastD(null),3200);};

  // Load from Firebase on mount, then listen real-time
  useEffect(()=>{
    if(!CONFIGURED){setReady(true);return;}
    Promise.all([
      FS.get("config/employees",{list:DEF_EMPS}),
      FS.get("config/admin",    DEF_ADMIN),
      FS.get("config/geofence", DEF_GEO),
      FS.get("data/records",    {}),
    ]).then(([empData,adm,geo,rec])=>{
      setEmployees(empData.list||DEF_EMPS);
      setAdminCred(adm);
      setGeofence(geo);
      setRecords(rec);
      setReady(true);
    });
    // real-time listeners
    const unsubs=[
      FS.listen("config/employees",d=>{if(d.list)setEmployees(d.list);}),
      FS.listen("config/admin",    d=>setAdminCred(d)),
      FS.listen("config/geofence", d=>setGeofence(d)),
      FS.listen("data/records",    d=>setRecords(d)),
    ];
    return()=>unsubs.forEach(u=>u&&u());
  },[]);

  const saveEmps    = async l=>{setEmployees(l);await FS.set("config/employees",{list:l});};
  const saveAdminPw = async pw=>{const a={...adminCred,password:pw};setAdminCred(a);await FS.set("config/admin",a);};
  const saveGeo     = async g=>{setGeofence(g);await FS.set("config/geofence",g);};
  const saveRec     = async r=>{setRecords(r);await FS.set("data/records",r);};

  const getLoc=useCallback(()=>new Promise(res=>{
    if(!navigator.geolocation){res({loc:"GPS မရနိုင်",ok:!geofence.enabled});return;}
    setLocMsg("📍 တည်နေရာ စစ်ဆေးနေသည်...");
    navigator.geolocation.getCurrentPosition(
      p=>{setLocMsg("");const loc=`${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;if(geofence.enabled&&geofence.lat){const dist=haversine(geofence.lat,geofence.lng,p.coords.latitude,p.coords.longitude);if(dist>geofence.radius){res({loc,ok:false,dist:Math.round(dist)});return;}}res({loc,ok:true});},
      err=>{setLocMsg("");const msgs={1:"Location permission ပိတ်ထားသည်",2:"GPS signal မရ",3:"GPS timeout"};res(geofence.enabled&&geofence.lat?{loc:msgs[err.code]||"Error",ok:false,noGPS:true}:{loc:"Location မရ",ok:true});},
      {timeout:10000,enableHighAccuracy:true,maximumAge:0}
    );
  }),[geofence]);

  const doAction=async type=>{
    if(!session?.emp)return;setLoading(true);
    const{loc,ok,dist,noGPS}=await getLoc();
    if(!ok){setLoading(false);showToast(noGPS?`❌ ${loc}`:`🚫 ဆိုင်မှ ${dist}m ဝေးနေသည် — ဆိုင်ရောက်မှ Check In/Out လုပ်ပါ`,"err");return;}
    const nr={...records};if(!nr[todayKey()])nr[todayKey()]={};
    nr[todayKey()][session.emp.id]={...(nr[todayKey()][session.emp.id]||{}),[type]:Date.now(),[type+"Loc"]:loc};
    await saveRec(nr);setLoading(false);
    showToast(type==="in"?`✅ ${session.emp.name} — Check In အောင်မြင်သည်`:`👋 ${session.emp.name} — Check Out အောင်မြင်သည်`);
  };

  if(!ready)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16}},React.createElement("div",{style:{fontSize:44,marginBottom:4}},"🍽️"),React.createElement("div",{className:"spinner"}),React.createElement("p",{style:{color:"#5a4020",fontSize:12}},"Cloud data ရယူနေသည်..."));

  return React.createElement("div",{style:{minHeight:"100vh",background:"radial-gradient(ellipse at 50% 0%,#1a1408 0%,#0e0c08 65%)",display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:50}},
    React.createElement(Toast,{t:toastD}),
    React.createElement("div",{style:{width:"100%",maxWidth:440,padding:"20px 18px 6px"}},
      React.createElement("h1",{style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:600,margin:0,background:"linear-gradient(90deg,#f4a941,#e8d5a0)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"🍽️ Staff Attendance"),
      session&&React.createElement("p",{style:{color:"#3a2e18",fontSize:11,margin:"3px 0 0"}},fmtDateK(todayKey()))
    ),
    React.createElement("div",{style:{width:"100%",maxWidth:440,padding:"0 18px"}},
      !CONFIGURED?React.createElement(SetupScreen,null)
      :!session?React.createElement(Login,{employees,admin:adminCred,onLogin:(role,emp)=>setSession({role,emp}),onSaveEmps:saveEmps})
      :session.role==="emp"?React.createElement(EmpDash,{emp:session.emp,records,geofence,onIn:()=>doAction("in"),onOut:()=>doAction("out"),loading,locMsg,onLogout:()=>setSession(null)})
      :React.createElement(AdminPanel,{employees,records,adminCred,geofence,onSaveEmps:saveEmps,onSaveGeo:saveGeo,onSaveAdminPw:saveAdminPw,onLogout:()=>setSession(null),toast:showToast})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
