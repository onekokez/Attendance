*{box-sizing:border-box;margin:0;padding:0;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeU{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideD{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
input::placeholder{color:#3a2e18!important;}
select option{background:#141008;color:#e8d5a0;}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:#3a2e18;border-radius:2px;outline:none;width:100%;}

::-webkit-scrollbar{width:4px;}

.shake{animation:shake .4s ease;}

<body>

  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;">

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

/* ── Storage ────────────────────────────────────── */
const S = {
  get: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

/* ── Device Fingerprint ─────────────────────────── */
// Creates a semi-stable device ID from browser characteristics
function getDeviceId() {
  const cached = sessionStorage.getItem("_did");
  if (cached) return cached;
  const nav = window.navigator;
  const scr = window.screen;
  const raw = [
    nav.userAgent,
    nav.language,
    scr.colorDepth,
    scr.width + "x" + scr.height,
    new Date().getTimezoneOffset(),
    nav.hardwareConcurrency || "",
    nav.platform || "",
  ].join("|");
  // simple hash
  let h = 0;
  for (let i = 0; i < raw.length; i++) { h = ((h << 5) - h + raw.charCodeAt(i)) | 0; }
  const id = "D" + Math.abs(h).toString(16).toUpperCase();
  sessionStorage.setItem("_did", id);
  return id;
}

/* ── Defaults ───────────────────────────────────── */
const DEF_EMPS = [
  { id:"e1", username:"minmin",  password:"1234", name:"မင်းမင်း", role:"Chef",    avatar:"👨‍🍳", deviceId:null },
  { id:"e2", username:"thuzar",  password:"1234", name:"သူဇာ",    role:"Waiter",  avatar:"🧑‍💼", deviceId:null },
  { id:"e3", username:"ayemyat", password:"1234", name:"အေးမြ",   role:"Cashier", avatar:"💁‍♀️", deviceId:null },
];
const DEF_ADMIN = { username:"admin", password:"admin123" };
const DEF_GEO   = { lat:null, lng:null, radius:100, enabled:false };

/* ── Helpers ────────────────────────────────────── */
const todayKey    = () => new Date().toISOString().slice(0,10);
const pad         = n  => String(n).padStart(2,"0");
const dayKey      = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const fmtTime     = ts => ts ? new Date(ts).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}) : "—";
const fmtDateK    = d  => new Date(d+"T00:00:00").toLocaleDateString("my-MM",{weekday:"short",year:"numeric",month:"short",day:"numeric"});
const calcHours   = r  => { if(!r?.in||!r?.out) return null; const d=r.out-r.in; return `${Math.floor(d/3600000)}h ${Math.floor((d%3600000)/60000)}m`; };
const calcMins    = r  => { if(!r?.in||!r?.out) return 0; return Math.round((r.out-r.in)/60000); };
const daysInMonth = (y,m) => new Date(y,m+1,0).getDate();
const firstDOW    = (y,m) => new Date(y,m,1).getDay();
const haversine   = (lat1,lon1,lat2,lon2) => {
  const R=6371000,dL=(lat2-lat1)*Math.PI/180,dO=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

/* ── UI Atoms ───────────────────────────────────── */
function Toast({t}) {
  if(!t) return null;
  return (
    <div style={{position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",
      background:t.err?"#3a1010":"#0e2a10",border:`1px solid ${t.err?"#7a2020":"#1e6a1e"}`,
      color:t.err?"#e08080":"#7dcc7d",padding:"11px 22px",borderRadius:14,zIndex:9999,
      fontSize:13,boxShadow:"0 4px 24px rgba(0,0,0,.6)",animation:"slideD .3s ease",
      maxWidth:340,textAlign:"center",fontFamily:"inherit"}}>
      {t.msg}
    </div>
  );
}

function Inp({label,...p}) {
  const [f,setF] = useState(false);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      {label && <label style={{color:"#7a6030",fontSize:11,letterSpacing:.7}}>{label}</label>}
      <input className="inp" {...p}
        onFocus={e=>{setF(true);p.onFocus&&p.onFocus(e);}}
        onBlur={e=>{setF(false);p.onBlur&&p.onBlur(e);}}
        style={{borderColor:f?"#f4a941":"#3a2e1a",...p.style}}/>
    </div>
  );
}

const BV = {
  gold:  {background:"linear-gradient(135deg,#c8861e,#9a5e0a)",  color:"#fff3d0"},
  green: {background:"linear-gradient(135deg,#2a6018,#184808)",  color:"#80d880"},
  red:   {background:"linear-gradient(135deg,#681818,#480808)",  color:"#e08080"},
  ghost: {background:"none",border:"1px solid #3a2e1a",          color:"#8a7040"},
  danger:{background:"#240e0e",border:"1px solid #501818",       color:"#e05050"},
  blue:  {background:"linear-gradient(135deg,#1a3a6a,#0a2448)",  color:"#80b8e8"},
  teal:  {background:"linear-gradient(135deg,#0e4a3a,#083028)",  color:"#60d8b8"},
  amber: {background:"linear-gradient(135deg,#6a4a0a,#482e04)",  color:"#f4d080"},
};
function Btn({children, v="gold", full, sx={}, ...p}) {
  return (
    <button className="btn" {...p} style={{...BV[v], width:full?"100%":undefined, ...sx}}>
      {children}
    </button>
  );
}

const SL = ({c}) => <p style={{color:"#6a5020",fontSize:11,letterSpacing:.8,margin:"0 0 13px"}}>{c}</p>;

/* ── Calendar ───────────────────────────────────── */
function CalendarView({records, empId, empName, empAvatar}) {
  const now = new Date();
  const [yr,setYr]     = useState(now.getFullYear());
  const [mo,setMo]     = useState(now.getMonth());
  const [detail,setDetail] = useState(null);

  const prevMo = () => { if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1); };
  const nextMo = () => {
    const n=new Date();
    if(yr>n.getFullYear()||(yr===n.getFullYear()&&mo>=n.getMonth())) return;
    if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);
  };

  const days=daysInMonth(yr,mo), start=firstDOW(yr,mo);
  const cells=[...Array(start).fill(null),...Array.from({length:days},(_,i)=>i+1)];
  const today=todayKey();

  const statusOf = d => {
    if(!d) return "empty";
    const k=dayKey(yr,mo,d), rec=(records[k]||{})[empId]||null;
    if(k>today) return "future";
    if(!rec?.in) return "absent";
    if(rec.in&&!rec.out) return "partial";
    return "present";
  };
  const SC = {
    present:{bg:"#1a3808",border:"#3a7018",dot:"#7dcc7d"},
    partial:{bg:"#3a2a08",border:"#8a6018",dot:"#f4a941"},
    absent: {bg:"#3a0808",border:"#7a1818",dot:"#e08080"},
    future: {bg:"#181410",border:"#282010",dot:"transparent"},
    empty:  {bg:"transparent",border:"transparent",dot:"transparent"},
  };
  const stats={present:0,absent:0,partial:0};
  for(let d=1;d<=days;d++){const k=dayKey(yr,mo,d);if(k>today)continue;const s=statusOf(d);if(s in stats)stats[s]++;}
  const DOW=["တနင်","တလာ","အင်","ဗုဒ္ဓ","ကြာ","သောက်","စနေ"];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div className="card">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <button onClick={prevMo} style={{background:"#241e0a",border:"1px solid #3a2e18",color:"#b09040",borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>‹</button>
          <div style={{textAlign:"center"}}>
            {empAvatar&&<div style={{fontSize:24,marginBottom:3}}>{empAvatar}</div>}
            {empName&&<p style={{margin:"0 0 3px",fontWeight:600,fontSize:13}}>{empName}</p>}
            <p style={{margin:0,color:"#c9a96e",fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:600}}>
              {new Date(yr,mo).toLocaleDateString("my-MM",{year:"numeric",month:"long"})}
            </p>
          </div>
          <button onClick={nextMo} style={{background:"#241e0a",border:"1px solid #3a2e18",color:"#b09040",borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[["✅","တက်ရောက်",stats.present,"#1a3808","#7dcc7d"],
            ["🟡","တစ်ဝက်",  stats.partial,"#2e2008","#f4a941"],
            ["❌","မတက်",    stats.absent, "#2e0808","#e08080"]].map(([icon,lbl,cnt,bg,col])=>(
            <div key={lbl} style={{background:bg,borderRadius:12,padding:"10px 6px",textAlign:"center"}}>
              <p style={{margin:0,fontSize:16}}>{icon}</p>
              <p style={{margin:"2px 0",color:col,fontSize:16,fontWeight:700}}>{cnt}</p>
              <p style={{margin:0,color:"#6a5020",fontSize:10}}>{lbl}</p>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:5}}>
          {DOW.map(d=><div key={d} style={{textAlign:"center",color:"#5a4820",fontSize:9,padding:"3px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {cells.map((d,i)=>{
            const s=statusOf(d),c=SC[s],isToday=d&&dayKey(yr,mo,d)===today;
            return (
              <div key={i}
                onClick={()=>{ if(!d||s==="future"||s==="empty") return; const k=dayKey(yr,mo,d); setDetail({k,rec:(records[k]||{})[empId]||null}); }}
                style={{background:c.bg,border:`1px solid ${isToday?"#f4a941":c.border}`,borderRadius:7,padding:"5px 2px",textAlign:"center",cursor:(d&&s!=="future"&&s!=="empty")?"pointer":"default",minHeight:38,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,boxShadow:isToday?"0 0 8px rgba(244,169,65,.25)":"none",transition:"transform .1s"}}
                onMouseEnter={e=>{ if(d&&s!=="future") e.currentTarget.style.transform="scale(1.1)"; }}
                onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
                <span style={{fontSize:10,color:isToday?"#f4a941":"#8a7040",fontWeight:isToday?700:400}}>{d||""}</span>
                {d&&s!=="future"&&s!=="empty"&&<div style={{width:5,height:5,borderRadius:"50%",background:c.dot}}/>}
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:12,marginTop:11,justifyContent:"center"}}>
          {[["#7dcc7d","တက်ရောက်"],["#f4a941","In သာ"],["#e08080","မတက်"]].map(([c,l])=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:c}}/><span style={{color:"#5a4820",fontSize:10}}>{l}</span>
            </div>
          ))}
        </div>
      </div>
      {detail && (
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
            <p style={{margin:0,color:"#c9a96e",fontWeight:600,fontSize:14}}>{fmtDateK(detail.k)}</p>
            <button onClick={()=>setDetail(null)} style={{background:"#241e0a",border:"1px solid #3a2e18",color:"#8a7040",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>✕</button>
          </div>
          {detail.rec?.in ? (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={{background:"#142808",borderRadius:12,padding:"12px 14px"}}>
                <p style={{margin:0,color:"#406030",fontSize:10}}>CHECK IN</p>
                <p style={{margin:"5px 0 0",color:"#f4a941",fontSize:20,fontWeight:700}}>{fmtTime(detail.rec.in)}</p>
                {detail.rec.inLoc&&<p style={{margin:"3px 0 0",color:"#304820",fontSize:9}}>📍 {detail.rec.inLoc}</p>}
              </div>
              <div style={{background:detail.rec.out?"#280a0a":"#181210",borderRadius:12,padding:"12px 14px"}}>
                <p style={{margin:0,color:"#603040",fontSize:10}}>CHECK OUT</p>
                <p style={{margin:"5px 0 0",color:detail.rec.out?"#7dcc7d":"#4a3020",fontSize:20,fontWeight:700}}>{detail.rec.out?fmtTime(detail.rec.out):"—"}</p>
                {detail.rec.outLoc&&<p style={{margin:"3px 0 0",color:"#3a1818",fontSize:9}}>📍 {detail.rec.outLoc}</p>}
              </div>
              {calcHours(detail.rec)&&(
                <div style={{gridColumn:"span 2",textAlign:"center",color:"#c9a96e",background:"#241a08",borderRadius:10,padding:"8px"}}>
                  ⏱ <strong style={{color:"#f4a941"}}>{calcHours(detail.rec)}</strong>
                </div>
              )}
            </div>
          ):(
            <p style={{color:"#5a2020",textAlign:"center",margin:0,padding:"10px 0"}}>❌ မတက်ရောက်ပါ</p>
          )}
        </div>
      )}
    </div>
  );
}

/* ── GeoTab ─────────────────────────────────────── */
function GeoTab({geofence, onSave, toast}) {
  const [geo,setGeo]   = useState(geofence);
  const [loading,setL] = useState(false);
  const [mLat,setMLat] = useState("");
  const [mLng,setMLng] = useState("");
  const [showM,setShowM] = useState(false);
  useEffect(()=>setGeo(geofence),[geofence]);

  const getGPS = () => {
    setL(true);
    if(!navigator.geolocation){toast("Geolocation မထောက်ပံ့ပါ","err");setL(false);return;}
    navigator.geolocation.getCurrentPosition(
      p=>{setGeo(g=>({...g,lat:p.coords.latitude,lng:p.coords.longitude}));setL(false);toast("✅ GPS တည်နေရာ ရယူပြီး");},
      err=>{setL(false);const m={1:"Location permission ပိတ်ထားသည်",2:"GPS signal မရရှိပါ",3:"Timeout"};toast(m[err.code]||"Error","err");setShowM(true);},
      {timeout:10000,enableHighAccuracy:true,maximumAge:0}
    );
  };
  const setManual = () => {
    const lat=parseFloat(mLat),lng=parseFloat(mLng);
    if(isNaN(lat)||isNaN(lng)||lat<-90||lat>90||lng<-180||lng>180){toast("Coordinates မှားနေသည်","err");return;}
    setGeo(g=>({...g,lat,lng}));toast("✅ သတ်မှတ်ပြီး");setShowM(false);
  };

  return (
    <div className="card">
      <SL c="📍 ဆိုင်တည်နေရာ Geofence"/>
      <div style={{background:"#1a1408",border:"1px solid #3a2a08",borderRadius:13,padding:"12px 14px",marginBottom:13}}>
        <p style={{margin:0,color:"#8a6820",fontSize:12,lineHeight:1.6}}>🔒 ဖွင့်ထားပါက ဆိုင်ရောက်မှသာ Check In/Out လုပ်ခွင့်ရမည်</p>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:"#181208",borderRadius:13,border:"1px solid #282010",marginBottom:12}}>
        <div>
          <p style={{margin:0,fontWeight:600,fontSize:14}}>Geofence {geo.enabled?"ဖွင့်ထား":"ပိတ်ထား"}</p>
          <p style={{margin:"2px 0 0",color:"#5a4020",fontSize:11}}>{geo.enabled?"ဆိုင်တွင်သာ":"မည်သည့်နေရာမှမဆို"}</p>
        </div>
        <button onClick={()=>setGeo(g=>({...g,enabled:!g.enabled}))} style={{width:46,height:26,borderRadius:13,border:"none",cursor:"pointer",background:geo.enabled?"#2a6018":"#3a2010",position:"relative",transition:"background .2s"}}>
          <div style={{position:"absolute",top:3,left:geo.enabled?23:3,width:20,height:20,borderRadius:"50%",background:geo.enabled?"#7dcc7d":"#6a5020",transition:"left .2s"}}/>
        </button>
      </div>
      {geo.enabled && (
        <>
          <Btn v="blue" full sx={{marginBottom:10}} onClick={getGPS}>{loading?"📍 ရယူနေသည်...":"📍 GPS မှ တည်နေရာ ရယူမည်"}</Btn>
          <button onClick={()=>setShowM(v=>!v)} style={{width:"100%",padding:"9px",borderRadius:11,border:"1px dashed #3a3010",background:"transparent",color:"#7a6030",cursor:"pointer",fontSize:12,fontFamily:"inherit",marginBottom:10}}>✏️ Coordinates ကိုယ်တိုင်ထည့်မည် {showM?"▲":"▼"}</button>
          {showM&&(
            <div style={{background:"#181208",borderRadius:14,padding:14,border:"1px solid #3a2e18",marginBottom:10}}>
              <p style={{margin:"0 0 10px",color:"#7a6030",fontSize:11}}>Google Maps → ဆိုင်တည်နေရာ → right-click → "What's here?" → coordinates ကူးပါ</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <Inp label="Latitude"  placeholder="16.8660" value={mLat} onChange={e=>setMLat(e.target.value)} type="number" step="any"/>
                <Inp label="Longitude" placeholder="96.1951" value={mLng} onChange={e=>setMLng(e.target.value)} type="number" step="any"/>
              </div>
              <Btn v="green" full onClick={setManual}>သတ်မှတ်မည်</Btn>
            </div>
          )}
          {geo.lat&&(
            <div style={{background:"#142e08",borderRadius:12,padding:"10px 13px",border:"1px solid #2a5018",marginBottom:12}}>
              <p style={{margin:0,color:"#5a9030",fontSize:11}}>✅ တည်နေရာ သတ်မှတ်ပြီး</p>
              <p style={{margin:"3px 0 0",color:"#3a6020",fontSize:10,fontFamily:"monospace"}}>{geo.lat.toFixed(6)}, {geo.lng.toFixed(6)}</p>
            </div>
          )}
          <div style={{marginBottom:14}}>
            <label style={{color:"#7a6030",fontSize:11,display:"block",marginBottom:6}}>RADIUS: <strong style={{color:"#f4a941"}}>{geo.radius}m</strong></label>
            <input type="range" min={30} max={500} step={10} value={geo.radius} onChange={e=>setGeo(g=>({...g,radius:+e.target.value}))} style={{accentColor:"#f4a941"}}/>
            <div style={{display:"flex",justifyContent:"space-between",color:"#4a3818",fontSize:10,marginTop:3}}><span>30m</span><span>500m</span></div>
          </div>
        </>
      )}
      <Btn v="gold" full onClick={()=>{ if(geo.enabled&&!geo.lat){toast("တည်နေရာ ဦးစွာ သတ်မှတ်ပါ","err");return;} onSave(geo);toast("✅ သိမ်းဆည်းပြီး"); }}>သိမ်းဆည်းမည်</Btn>
    </div>
  );
}

/* ── ExportTab ──────────────────────────────────── */
function ExportTab({employees, records, toast}) {
  const now=new Date();
  const [yr,setYr]=useState(now.getFullYear());
  const [mo,setMo]=useState(now.getMonth());
  const days=daysInMonth(yr,mo);
  const monthName=new Date(yr,mo).toLocaleDateString("en-GB",{year:"numeric",month:"long"});

  const buildSummary=()=>{
    const header=["ဝန်ထမ်း","ရာထူး",...Array.from({length:days},(_,i)=>String(i+1)),"တက်ရောက်","မတက်","တစ်ဝက်","ပျမ်းမျှ နာရီ"];
    const rows=[header];
    employees.forEach(emp=>{
      const row=[emp.name,emp.role];
      let present=0,absent=0,partial=0,totalMins=0;
      for(let d=1;d<=days;d++){
        const k=dayKey(yr,mo,d),rec=(records[k]||{})[emp.id]||null;
        if(!rec?.in){row.push("✗");absent++;}
        else if(!rec.out){row.push("½");partial++;totalMins+=calcMins(rec);}
        else{row.push("✓");present++;totalMins+=calcMins(rec);}
      }
      const tot=present+partial;
      row.push(present,absent,partial,tot>0?`${Math.floor(totalMins/tot/60)}h ${Math.floor(totalMins/tot%60)}m`:"");
      rows.push(row);
    });
    return rows;
  };
  const buildDetail=()=>{
    const rows=[];
    for(let d=1;d<=days;d++){
      const k=dayKey(yr,mo,d),dow=new Date(yr,mo,d).toLocaleDateString("en-GB",{weekday:"short"});
      employees.forEach(emp=>{
        const rec=(records[k]||{})[emp.id]||null;
        rows.push({ရက်:k,နေ့:dow,ဝန်ထမ်း:emp.name,ရာထူး:emp.role,"Check In":rec?.in?fmtTime(rec.in):"","Check Out":rec?.out?fmtTime(rec.out):"","နာရီ":calcHours(rec)||"",မှတ်ချက်:!rec?.in?"မတက်ရောက်":!rec?.out?"Out မရှိ":"တက်ရောက်"});
      });
    }
    return rows;
  };
  const doExport=()=>{
    try{
      const wb=XLSX.utils.book_new();
      const ws1=XLSX.utils.aoa_to_sheet(buildSummary());
      ws1["!cols"]=[{wch:14},{wch:10},...Array(days).fill({wch:4}),{wch:10},{wch:10},{wch:8},{wch:12}];
      XLSX.utils.book_append_sheet(wb,ws1,"Summary");
      const ws2=XLSX.utils.json_to_sheet(buildDetail());
      ws2["!cols"]=[{wch:12},{wch:6},{wch:14},{wch:10},{wch:10},{wch:10},{wch:10},{wch:14}];
      XLSX.utils.book_append_sheet(wb,ws2,"Detail");
      XLSX.writeFile(wb,`Attendance_${monthName.replace(" ","_")}.xlsx`);
      toast("✅ Excel download ဆင်းပြီး");
    }catch(e){toast("Export မအောင်မြင်ပါ: "+e.message,"err");}
  };

  return (
    <div className="card">
      <SL c="📊 Attendance Excel Export"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div>
          <label style={{color:"#7a6030",fontSize:11,display:"block",marginBottom:5}}>နှစ်</label>
          <select value={yr} onChange={e=>setYr(+e.target.value)} className="inp" style={{padding:"10px 14px"}}>
            {[now.getFullYear()-1,now.getFullYear()].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <div>
          <label style={{color:"#7a6030",fontSize:11,display:"block",marginBottom:5}}>လ</label>
          <select value={mo} onChange={e=>setMo(+e.target.value)} className="inp" style={{padding:"10px 14px"}}>
            {Array.from({length:12},(_,i)=>i).map(m=>(
              <option key={m} value={m}>{new Date(yr,m).toLocaleDateString("en-GB",{month:"long"})}{yr===now.getFullYear()&&m===now.getMonth()?" ★":""}</option>
            ))}
          </select>
        </div>
      </div>
      <Btn v="teal" full sx={{fontSize:15,padding:14,marginBottom:8}} onClick={doExport}>⬇️ {monthName} — Excel Download</Btn>
      <p style={{margin:0,color:"#3a2e18",fontSize:11,textAlign:"center"}}>Excel / Google Sheets ဖြင့် ဖွင့်နိုင်သည်</p>
    </div>
  );
}

/* ── Login ──────────────────────────────────────── */
function Login({employees, admin, onLogin, onSaveEmps}) {
  const [u,setU]       = useState("");
  const [pw,setPw]     = useState("");
  const [show,setShow] = useState(false);
  const [err,setErr]   = useState("");
  const [busy,setBusy] = useState(false);
  const boxRef         = useRef(null);

  const shake = () => { const b=boxRef.current; if(!b)return; b.classList.add("shake"); setTimeout(()=>b.classList.remove("shake"),400); };

  const go = async () => {
    setErr("");
    if(!u.trim()||!pw){ setErr("Username နှင့် Password ဖြည့်ပါ"); shake(); return; }
    setBusy(true);
    await new Promise(r=>setTimeout(r,280));

    // Admin check (no device binding)
    if(u.trim()===admin.username && pw===admin.password){ onLogin("admin",null); setBusy(false); return; }

    // Employee check
    const emp = employees.find(e=>e.username===u.trim()&&e.password===pw);
    if(!emp){ setErr("Username သို့မဟုတ် Password မှားနေသည်"); shake(); setBusy(false); return; }

    const currentDev = getDeviceId();

    // No device bound yet → bind now
    if(!emp.deviceId) {
      const updated = employees.map(e=>e.id===emp.id ? {...e, deviceId:currentDev} : e);
      onSaveEmps(updated);
      onLogin("emp", {...emp, deviceId:currentDev});
      setBusy(false);
      return;
    }

    // Device mismatch → block
    if(emp.deviceId !== currentDev) {
      setErr("🚫 ဤ account သည် တစ်ခြား device နှင့်ချိတ်ဆက်ထားသည်\nကိုယ်ပိုင် phone မှသာ Login ဝင်နိုင်သည်");
      shake(); setBusy(false); return;
    }

    // All good
    onLogin("emp", emp);
    setBusy(false);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:22,animation:"fadeU .4s ease"}}>
      <div style={{textAlign:"center",padding:"14px 0 0"}}>
        <div style={{fontSize:52,marginBottom:10}}>🍽️</div>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,margin:0,background:"linear-gradient(90deg,#f4a941,#e8d5a0)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Staff Attendance</h1>
        <p style={{color:"#3a2e18",fontSize:12,margin:"6px 0 0",letterSpacing:.8}}>{fmtDateK(todayKey())}</p>
      </div>
      <div className="card" ref={boxRef}>
        <SL c="Account ဖြင့် ဝင်ရောက်ပါ"/>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Inp label="USERNAME" placeholder="username ထည့်ပါ" value={u} onChange={e=>setU(e.target.value)} autoCapitalize="none" autoCorrect="off"/>
          <div style={{position:"relative"}}>
            <Inp label="PASSWORD" placeholder="password ထည့်ပါ" type={show?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} style={{paddingRight:44}}/>
            <button onClick={()=>setShow(v=>!v)} style={{position:"absolute",right:13,bottom:11,background:"none",border:"none",color:"#6a5020",cursor:"pointer",fontSize:15,fontFamily:"inherit"}}>{show?"🙈":"👁️"}</button>
          </div>
          {err && <p style={{color:"#e05252",fontSize:12,margin:0,textAlign:"center",whiteSpace:"pre-line"}}>{err}</p>}
          <Btn full onClick={go} disabled={busy} sx={{marginTop:4}}>{busy?"Logging in...":"Login ဝင်မည်"}</Btn>
        </div>
      </div>
      <p style={{color:"#2a2010",fontSize:11,textAlign:"center",margin:0}}>မိမိ phone မှသာ login ဝင်ခွင့်ရှိသည်</p>
    </div>
  );
}

                  <Btn v="green" onClick={()=>{
                    if(!ne.name||!ne.username||!ne.password){toast("အချက်အလက် ဖြည့်ပါ","err");return;}
                    if(list.find(e=>e.username===ne.username)){toast("Username ရှိနှင့်ပြီးသား","err");return;}
                    const emp={...ne,id:"e"+Date.now(),deviceId:null};
                    saveEmps([...list,emp]);
                    setNe({name:"",role:"",username:"",password:"",avatar:"🧑"});
                    setAddMode(false);toast(`✅ ${emp.name} ထည့်သွင်းပြီး`);
                  }}>ထည့်မည်</Btn>
                </div>
              </div>
            )}
          </div>
          <div className="card">
            <SL c="Admin Password ပြောင်းမည်"/>
            <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
              <div style={{flex:1}}><Inp placeholder="Password အသစ်" value={aPw} onChange={e=>{setAPw(e.target.value);setPwDirty(true);}}/></div>
              {pwDirty&&<Btn v="gold" sx={{whiteSpace:"nowrap",padding:"11px 14px"}} onClick={()=>{if(!aPw){toast("Password မဖြည့်ရသေးပါ","err");return;}onSaveAdminPw(aPw);setPwDirty(false);toast("✅ Admin password ပြောင်းပြီး");}}>သိမ်းမည်</Btn>}
            </div>
          </div>
        </div>
      )}

      {tab==="geofence"&&<GeoTab geofence={geofence} onSave={onSaveGeo} toast={toast}/>}
      {tab==="export"&&<ExportTab employees={list} records={records} toast={toast}/>}
    </div>
  );
}

/* ── Root ───────────────────────────────────────── */
function App() {
  const [employees, setEmployees] = useState(() => S.get("ae", DEF_EMPS));
  const [adminCred, setAdminCred] = useState(() => S.get("aa", DEF_ADMIN));
  const [records,   setRecords  ] = useState(() => S.get("ar", {}));
  const [geofence,  setGeofence ] = useState(() => S.get("ag", DEF_GEO));
  const [session,   setSession  ] = useState(null);
  const [loading,   setLoading  ] = useState(false);
  const [locMsg,    setLocMsg   ] = useState("");
  const [toastD,    setToastD   ] = useState(null);

  const showToast = (msg, err) => { setToastD({msg,err}); setTimeout(()=>setToastD(null),3200); };
  const saveEmps    = e  => { setEmployees(e); S.set("ae",e); };
  const saveAdminPw = pw => { const a={...adminCred,password:pw}; setAdminCred(a); S.set("aa",a); };
  const saveGeo     = g  => { setGeofence(g); S.set("ag",g); };
  const saveRec     = r  => { setRecords(r);  S.set("ar",r); };

  const getLoc = useCallback(() => new Promise(res => {
    if(!navigator.geolocation){ res({loc:"GPS မရနိုင်", ok:!geofence.enabled}); return; }
    setLocMsg("📍 တည်နေရာ စစ်ဆေးနေသည်...");
    navigator.geolocation.getCurrentPosition(
      p => {
        setLocMsg("");
        const loc=`${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;
        if(geofence.enabled&&geofence.lat){
          const dist=haversine(geofence.lat,geofence.lng,p.coords.latitude,p.coords.longitude);
          if(dist>geofence.radius){ res({loc,ok:false,dist:Math.round(dist)}); return; }
        }
        res({loc,ok:true});
      },
      err => {
        setLocMsg("");
        const msgs={1:"Location permission ပိတ်ထားသည်",2:"GPS signal မရ",3:"GPS timeout"};
        res(geofence.enabled&&geofence.lat ? {loc:msgs[err.code]||"Location error",ok:false,noGPS:true} : {loc:"Location မရ",ok:true});
      },
      {timeout:10000,enableHighAccuracy:true,maximumAge:0}
    );
  }), [geofence]);

  const doAction = async type => {
    if(!session?.emp) return;
    setLoading(true);
    const {loc,ok,dist,noGPS} = await getLoc();
    if(!ok){
      setLoading(false);
      showToast(noGPS?`❌ ${loc}`:`🚫 ဆိုင်မှ ${dist}m ဝေးနေသည် — ဆိုင်ရောက်မှ Check In/Out လုပ်ပါ`,"err");
      return;
    }
    const nr={...records};
    if(!nr[todayKey()]) nr[todayKey()]={};
    nr[todayKey()][session.emp.id]={...(nr[todayKey()][session.emp.id]||{}),[type]:Date.now(),[type+"Loc"]:loc};
    saveRec(nr); setLoading(false);
    showToast(type==="in"?`✅ ${session.emp.name} — Check In အောင်မြင်သည်`:`👋 ${session.emp.name} — Check Out အောင်မြင်သည်`);
  };

  return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 50% 0%,#1a1408 0%,#0e0c08 65%)",display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:50}}>
      <Toast t={toastD}/>
      <div style={{width:"100%",maxWidth:440,padding:"20px 18px 6px"}}>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:600,margin:0,background:"linear-gradient(90deg,#f4a941,#e8d5a0)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🍽️ Staff Attendance</h1>
        {session&&<p style={{color:"#3a2e18",fontSize:11,margin:"3px 0 0"}}>{fmtDateK(todayKey())}</p>}
      </div>
      <div style={{width:"100%",maxWidth:440,padding:"0 18px"}}>
        {!session?(
          <Login employees={employees} admin={adminCred} onLogin={(role,emp)=>setSession({role,emp})} onSaveEmps={saveEmps}/>
        ):session.role==="emp"?(
          <EmpDash emp={session.emp} records={records} geofence={geofence}
            onIn={()=>doAction("in")} onOut={()=>doAction("out")}
            loading={loading} locMsg={locMsg} onLogout={()=>setSession(null)}/>
        ):(
          <AdminPanel employees={employees} records={records} adminCred={adminCred} geofence={geofence}
            onSaveEmps={saveEmps} onSaveGeo={saveGeo} onSaveAdminPw={saveAdminPw}
            onLogout={()=>setSession(null)} toast={showToast}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
